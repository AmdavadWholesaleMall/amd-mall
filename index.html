        <form action="web.html" id="loginForm">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="custName" placeholder="Jaise: Amit Shah" required>
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" placeholder="example@mail.com" required>
            </div>
               <!-- Mobile Number Input -->
<div class="input-group">
    <label>Mobile Number</label>
    <input type="tel" id="userMobile" placeholder="98765 43210" pattern="[0-9]{10}" maxlength="10" required>
</div>

            <button type="submit">Login Karein 🚀</button>

        </form>
    </div>
 

<script>
    const loginForm = document.getElementById('loginForm');
    loginForm.addEventListener('submit', (e) => {
        // Yeh line mobile par error aane se rokegi
        e.preventDefault(); 

        const userName = document.getElementById('custName').value;
        const userMobile = document.getElementById('userMobile').value;
        
        // Data save ho raha hai
        localStorage.setItem('loggedInUser', userName);
        localStorage.setItem('userMobile', userMobile);

        // Yeh line user ko web.html par le jayegi
        window.location.href = "web.html"; 
    });
</script>
