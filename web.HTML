<script>
    let cart = [];

    // 1. Quantity badalne ke liye
    function changeQty(id, delta) {
        let input = document.getElementById(id);
        let currentVal = parseInt(input.value) || 1;
        if (currentVal + delta >= 1) {
            input.value = currentVal + delta;
        }
    }

    // 2. Cart mein item add karne ke liye
    function addToCart(itemName, price, qtyId) {
        let quantity = parseInt(document.getElementById(qtyId).value) || 1;
        let existingItem = cart.find(item => item.name === itemName);

        if (existingItem) {
            existingItem.qty += quantity;
        } else {
            cart.push({ name: itemName, price: price, qty: quantity });
        }

        updateCartUI();
        alert(itemName + " ઉમેરાઈ ગયું! ✅");
    }

    // 3. Header mein cart number update karne ke liye
    function updateCartUI() {
        let totalItems = cart.reduce((sum, item) => sum + item.qty, 0);
        document.getElementById('cart-count').innerText = totalItems;
    }

    // 4. WhatsApp Order bhejne ke liye
    function sendWhastappOrder() {
        if (cart.length === 0) {
            alert("તમારું કાર્ટ ખાલી છે!");
            return;
        }

        const savedName = localStorage.getItem('loggedInUser') || "Grahak";
        const savedMobile = localStorage.getItem('userMobile') || "N/A";

        let message = "📦 *નવો ઓર્ડર - Amdavad Wholesale Mall*%0a";
        message += "--------------------------%0a";
        message += "*Customer:* " + savedName + "%0a";
        message += "*Mobile:* " + savedMobile + "%0a";
        message += "--------------------------%0a";

        let grandTotal = 0;
        cart.forEach((item, index) => {
            let itemTotal = item.price * item.qty;
            message += `*${index + 1}.* ${item.name}%0a`;
            message += `   નંગ: *${item.qty}* x ₹${item.price} = *₹${itemTotal}*%0a`;
            grandTotal += itemTotal;
        });

        message += "--------------------------%0a";
        message += `*કુલ ઓર્ડર કિંમત: ₹${grandTotal}*%0a`;
        message += "--------------------------%0a";
        message += "કૃપા કરીને મારો ઓર્ડર કન્ફર્મ કરશો. 🙏";

        const phoneNumber = "917859979392";
        window.open(`https://wa.me/${phoneNumber}?text=${message}`, '_blank');
    }

    // 5. Product Search karne ke liye
    function searchProduct() {
        let input = document.getElementById('searchInput').value.toLowerCase();
        let cards = document.getElementsByClassName('product-card');

        for (let i = 0; i < cards.length; i++) {
            let title = cards[i].querySelector('.product-title').innerText.toLowerCase();
            if (title.includes(input)) {
                cards[i].style.display = "";
            } else {
                cards[i].style.display = "none";
            }
        }
    }

    // 6. Header mein Naam dikhane ke liye (Page load hote hi)
    window.addEventListener('DOMContentLoaded', () => {
        const savedName = localStorage.getItem('loggedInUser');
        if (savedName) {
            // Header Desktop
            if(document.getElementById('display-name')) {
                document.getElementById('display-name').innerText = savedName;
            }
            // Header Mobile
            if(document.getElementById('display-name-mobile')) {
                document.getElementById('display-name-mobile').innerText = savedName;
            }
        }
    });
</script>
